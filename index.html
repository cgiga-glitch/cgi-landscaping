<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CGI Landscaping Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --forest:#1A2E1A; --moss:#3D6B35; --sage:#7DAE6E; --sage-lt:#A8D199;
    --cream:#F5F0E8; --soil:#6B4A2A; --gold:#C8A84B; --gold-lt:#E8D08A;
    --white:#FFFFFF; --gray:#8A9A88; --border:#D4CBBA;
    --danger:#C0392B; --success:#27AE60;
    --shadow:0 4px 20px rgba(26,46,26,0.12); --radius:14px;
    --seasonal:#7B5EA7;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--forest);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

  /* Header */
  .app-header{width:100%;max-width:480px;background:linear-gradient(135deg,var(--forest) 0%,#243D24 100%);padding:20px 20px 0;text-align:center;border-bottom:1px solid rgba(125,174,110,0.2);}
  .header-icon{font-size:36px;display:block;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
  .app-title{font-size:13px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);}
  .app-subtitle{font-size:22px;font-weight:700;color:var(--white);margin:2px 0 16px;letter-spacing:-0.3px;}
  .location-tabs{display:flex;gap:6px;padding:0 4px;width:100%;}
  .loc-tab{flex:1;padding:10px 6px;border:none;border-radius:10px 10px 0 0;background:rgba(255,255,255,0.07);color:var(--sage-lt);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;line-height:1.3;}
  .loc-tab:hover{background:rgba(255,255,255,0.12);}
  .loc-tab.active{background:var(--cream);color:var(--forest);}

  /* Main */
  .main-card{width:100%;max-width:480px;background:var(--cream);min-height:calc(100vh - 160px);padding:24px 20px 100px;position:relative;}

  /* Location Banner */
  .location-banner{display:flex;align-items:center;gap:12px;background:var(--forest);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;}
  .location-badge{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--moss),var(--sage));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .location-name{font-size:18px;font-weight:700;color:var(--white);letter-spacing:-0.3px;}
  .location-address{font-size:11px;color:var(--sage-lt);font-weight:500;margin-top:2px;}
  .location-date{margin-left:auto;text-align:right;flex-shrink:0;}
  .date-day{font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
  .date-month{font-size:10px;color:var(--gray);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;}

  /* Section Label */
  .section-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gray);margin-bottom:10px;padding-left:2px;}

  /* Task group separator */
  .task-group-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--seasonal);margin:16px 0 8px 2px;display:flex;align-items:center;gap:6px;}
  .task-group-label::after{content:'';flex:1;height:1px;background:rgba(123,94,167,0.2);}
  .task-group-label.regular{color:var(--moss);}
  .task-group-label.regular::after{background:rgba(61,107,53,0.2);}

  /* Task Cards */
  .task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .task-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);user-select:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
  .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--border);transition:background 0.2s;}
  .task-card.checked{border-color:var(--moss);background:#F0F7EE;}
  .task-card.checked::before{background:var(--moss);}
  .task-card.seasonal::before{background:rgba(123,94,167,0.3);}
  .task-card.seasonal.checked{border-color:var(--seasonal);background:#F3F0F8;}
  .task-card.seasonal.checked::before{background:var(--seasonal);}
  .task-card:active{transform:scale(0.97);}
  .task-checkbox{width:26px;height:26px;border-radius:8px;border:2.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);font-size:14px;color:var(--white);}
  .task-card.checked .task-checkbox{background:var(--moss);border-color:var(--moss);transform:scale(1.1);}
  .task-card.seasonal.checked .task-checkbox{background:var(--seasonal);border-color:var(--seasonal);}
  .task-checkbox-inner{opacity:0;transition:opacity 0.15s;}
  .task-card.checked .task-checkbox-inner{opacity:1;}
  .task-info{flex:1;min-width:0;}
  .task-name{font-size:14px;font-weight:600;color:var(--forest);transition:color 0.2s;}
  .task-card.checked .task-name{color:var(--moss);}
  .task-card.seasonal.checked .task-name{color:var(--seasonal);}
  .task-desc{font-size:11px;color:var(--gray);margin-top:2px;font-weight:400;}
  .task-icon{font-size:20px;opacity:0.7;flex-shrink:0;}

  /* Ripple */
  .ripple{position:absolute;border-radius:50%;background:rgba(61,107,53,0.18);transform:scale(0);animation:ripple-anim 0.5s linear;pointer-events:none;}
  @keyframes ripple-anim{to{transform:scale(4);opacity:0;}}

  /* Note */
  .note-wrap{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;transition:border-color 0.2s;}
  .note-wrap:focus-within{border-color:var(--moss);}
  .note-header{padding:10px 14px 8px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
  .note-textarea{width:100%;border:none;outline:none;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--forest);background:transparent;resize:none;min-height:72px;line-height:1.5;}
  .note-textarea::placeholder{color:var(--border);}

  /* Submit */
  .submit-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--moss) 0%,#2E5228 100%);color:var(--white);font-family:inherit;font-size:15px;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(61,107,53,0.35);position:relative;overflow:hidden;margin-bottom:0;}
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,107,53,0.45);}
  .submit-btn:active{transform:translateY(0);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

  /* ── Count Dashboard ── */
  .count-section{margin:20px 0 24px;}
  .count-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .count-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
  .count-card.seasonal-card{border-color:rgba(123,94,167,0.3);background:#FDFAFF;}
  .count-icon{font-size:20px;flex-shrink:0;}
  .count-info{flex:1;min-width:0;}
  .count-task-name{font-size:11px;font-weight:600;color:var(--forest);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .count-num{font-size:22px;font-weight:700;color:var(--moss);line-height:1;}
  .count-card.seasonal-card .count-num{color:var(--seasonal);}
  .count-label{font-size:9px;color:var(--gray);font-weight:500;letter-spacing:0.05em;}

  /* History */
  .history-section{margin-top:4px;}
  .history-list{display:flex;flex-direction:column;gap:8px;}
  .history-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--forest);border-left:3px solid var(--sage);}
  .history-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .history-loc{font-weight:700;font-size:13px;}
  .history-time{color:var(--gray);font-size:11px;}
  .history-tasks{display:flex;flex-wrap:wrap;gap:4px;}
  .history-tag{background:#EAF4E7;color:var(--moss);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
  .history-tag.seasonal{background:#F0ECF8;color:var(--seasonal);}
  .history-note{margin-top:6px;color:var(--gray);font-style:italic;font-size:11px;}
  .no-checks{text-align:center;padding:20px;color:var(--gray);font-size:13px;}



  /* Toast */
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--forest);color:var(--white);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:90vw;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{background:var(--success);}
  .toast.error{background:var(--danger);}

  .scroll-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Header -->
<div class="app-header">
  <span class="header-icon">🌿</span>
  <div class="app-title">CGI Holistic Fitness &amp; Spa</div>
  <div class="app-subtitle">Landscaping Log</div>
  <div class="location-tabs">
    <button class="loc-tab active" onclick="switchLocation(0)">CGI<br>Main</button>
    <button class="loc-tab"       onclick="switchLocation(1)">Location<br>A 301</button>
    <button class="loc-tab"       onclick="switchLocation(2)">Location<br>B 56</button>
  </div>
</div>

<div class="scroll-wrap">
<div class="main-card" id="mainCard">

  <!-- Location Banner -->
  <div class="location-banner">
    <div class="location-badge" id="locationBadge">🏢</div>
    <div>
      <div class="location-name" id="locationName">CGI Main</div>
      <div class="location-address" id="locationAddress">111 Homans Ave, Closter NJ</div>
    </div>
    <div class="location-date">
      <div class="date-day" id="dateDay"></div>
      <div class="date-month" id="dateMonth"></div>
    </div>
  </div>

  <!-- Task List (dynamically rendered) -->
  <div class="section-label">작업 항목 선택</div>
  <div id="taskList"></div>

  <!-- Note -->
  <div class="section-label">메모 (선택사항)</div>
  <div class="note-wrap">
    <div class="note-header">📝 작업 특이사항</div>
    <textarea class="note-textarea" id="noteInput" placeholder="특이사항, 추가 작업, 문제점 등을 입력하세요..."></textarea>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submitBtn" onclick="submitLog()">
    <span>📋</span><span id="submitLabel">작업 완료 기록</span>
  </button>

  <!-- Count Dashboard -->
  <div class="count-section">
    <div class="section-label" style="margin-bottom:10px">누적 작업 횟수</div>
    <div class="count-grid" id="countGrid"></div>
  </div>

</div>
</div>



<script>
// ───────────────────────────────────────────
// DATA DEFINITIONS
// ───────────────────────────────────────────
const LOCATIONS = [
  { name:'CGI Main',       address:'111 Homans Ave, Closter NJ', icon:'🏢' },
  { name:'Location A 301', address:'Location A, Suite 301',       icon:'🌳' },
  { name:'Location B 56',  address:'Location B, #56',             icon:'🌿' },
];

// Tasks per location index
// type: 'regular' | 'seasonal'
// seasonal items show in purple
const LOCATION_TASKS = [
  // ── 0: CGI Main ──
  [
    { id:'lawn_mowing',   name:'Lawn Mowing',     desc:'잔디 깎기 — 전체 구역',          icon:'🌱', type:'regular' },
    { id:'leaf_cleanup',  name:'Leaf Cleanup',    desc:'낙엽 청소 및 수거',               icon:'🍂', type:'regular' },
    { id:'edging',        name:'Edging',          desc:'경계선 정리 — 보도 및 화단',      icon:'✂️', type:'regular' },
    { id:'weed_control',  name:'Weed Control',    desc:'잡초 제거 및 방제',               icon:'🚫', type:'regular' },
    { id:'mulch',         name:'Mulch',           desc:'멀칭 작업',                       icon:'🪵', type:'regular' },
    { id:'shrub_jun',     name:'Shrub Pruning (June)', desc:'6월 관목 가지치기',          icon:'✂️', type:'seasonal' },
    { id:'shrub_oct',     name:'Shrub & Tree Pruning (Oct)', desc:'10월 관목·나무 가지치기', icon:'🌳', type:'seasonal' },
    { id:'weed_feed',     name:'Weed & Feed (Mar–Apr)', desc:'3~4월 잔디 비료 및 제초제', icon:'🌾', type:'seasonal' },
  ],
  // ── 1: Location A 301 ──
  [
    { id:'lawn_mowing',   name:'Lawn Mowing',     desc:'잔디 깎기 — 전체 구역',          icon:'🌱', type:'regular' },
    { id:'leaf_cleanup',  name:'Leaf Cleanup',    desc:'낙엽 청소 및 수거',               icon:'🍂', type:'regular' },
    { id:'edging',        name:'Edging',          desc:'경계선 정리 — 보도 및 화단',      icon:'✂️', type:'regular' },
    { id:'weed_control',  name:'Weed Control',    desc:'잡초 제거 및 방제',               icon:'🚫', type:'regular' },
    { id:'shrub_jun',     name:'Shrub Pruning (June)', desc:'6월 관목 가지치기',          icon:'✂️', type:'seasonal' },
    { id:'shrub_oct',     name:'Shrub & Tree Pruning (Oct)', desc:'10월 관목·나무 가지치기', icon:'🌳', type:'seasonal' },
    { id:'weed_feed',     name:'Weed & Feed (Mar–Apr)', desc:'3~4월 잔디 비료 및 제초제', icon:'🌾', type:'seasonal' },
  ],
  // ── 2: Location B 56 ──
  [
    { id:'lawn_mowing',   name:'Lawn Mowing',     desc:'잔디 깎기 — 전체 구역',          icon:'🌱', type:'regular' },
    { id:'leaf_cleanup',  name:'Leaf Cleanup',    desc:'낙엽 청소 및 수거',               icon:'🍂', type:'regular' },
    { id:'edging',        name:'Edging',          desc:'경계선 정리 — 보도 및 화단',      icon:'✂️', type:'regular' },
    { id:'weed_control',  name:'Weed Control',    desc:'잡초 제거 및 방제',               icon:'🚫', type:'regular' },
    { id:'shrub_jun',     name:'Shrub Pruning (June)', desc:'6월 관목 가지치기',          icon:'✂️', type:'seasonal' },
    { id:'shrub_oct',     name:'Shrub & Tree Pruning (Oct)', desc:'10월 관목·나무 가지치기', icon:'🌳', type:'seasonal' },
    { id:'weed_feed',     name:'Weed & Feed (Mar–Apr)', desc:'3~4월 잔디 비료 및 제초제', icon:'🌾', type:'seasonal' },
  ],
];

// ───────────────────────────────────────────
// STATE
// ───────────────────────────────────────────
let currentLoc = 0;

// ── Shared counts from Google Sheets ──
const SHEET_URL = 'https://script.google.com/macros/s/AKfycby-v2dgvT08WQX-rj2h1n_a4EOnGckvgJmDcyO5A8MrDjh4BIsKLUy7BTHhR4PvvxDj5Q/exec';
let sharedCounts = {}; // { 'loc_0': { 'lawn_mowing': 12, ... }, ... }

async function fetchCounts() {
  return new Promise((resolve) => {
    const cbName = '_cb_' + Date.now();
    const script = document.createElement('script');
    window[cbName] = function(data) {
      sharedCounts = (data && data.counts) ? data.counts : {};
      renderCountDashboard();
      delete window[cbName];
      script.remove();
      resolve();
    };
    script.src = SHEET_URL + '?action=counts&callback=' + cbName;
    script.onerror = () => { sharedCounts = {}; renderCountDashboard(); resolve(); };
    document.head.appendChild(script);
  });
}

function getCount(locIdx, taskId) {
  return (sharedCounts[`loc_${locIdx}`] || {})[taskId] || 0;
}

// ───────────────────────────────────────────
// INIT
// ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateDateDisplay();
  renderTasks();
  renderCountDashboard();
  fetchCounts();
});

function updateDateDisplay() {
  const now = new Date();
  document.getElementById('dateDay').textContent = now.getDate();
  document.getElementById('dateMonth').textContent =
    now.toLocaleString('en-US', { month:'short', year:'numeric' }).toUpperCase();
}

// ───────────────────────────────────────────
// LOCATION SWITCH
// ───────────────────────────────────────────
function switchLocation(idx) {
  currentLoc = idx;
  document.querySelectorAll('.loc-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  const loc = LOCATIONS[idx];
  document.getElementById('locationName').textContent    = loc.name;
  document.getElementById('locationAddress').textContent = loc.address;
  document.getElementById('locationBadge').textContent   = loc.icon;
  document.getElementById('noteInput').value = '';
  renderTasks();
  renderCountDashboard();
  fetchCounts();
}

// ───────────────────────────────────────────
// RENDER TASKS
// ───────────────────────────────────────────
function renderTasks() {
  const tasks = LOCATION_TASKS[currentLoc];
  const container = document.getElementById('taskList');

  let html = '';
  let lastType = null;
  tasks.forEach(task => {
    if (task.type !== lastType) {
      if (task.type === 'seasonal') {
        html += `<div class="task-group-label">🗓️ 계절 작업</div>`;
      } else if (lastType === 'seasonal') {
        html += `<div class="task-group-label regular">🔄 정기 작업</div>`;
      }
      lastType = task.type;
    }
    const cls = task.type === 'seasonal' ? 'task-card seasonal' : 'task-card';
    html += `
      <div class="${cls}" data-task="${task.name}" data-id="${task.id}" data-type="${task.type}" onclick="toggleTask(this,event)">
        <div class="task-checkbox"><span class="task-checkbox-inner">✓</span></div>
        <div class="task-info">
          <div class="task-name">${task.name}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <div class="task-icon">${task.icon}</div>
      </div>`;
  });
  container.innerHTML = `<div class="task-list" style="margin-bottom:24px">${html}</div>`;
}

// ───────────────────────────────────────────
// RENDER COUNT DASHBOARD
// ───────────────────────────────────────────
function renderCountDashboard() {
  const tasks = LOCATION_TASKS[currentLoc];
  const grid = document.getElementById('countGrid');
  grid.innerHTML = tasks.map(task => {
    const cnt = getCount(currentLoc, task.id);
    const isSeasonal = task.type === 'seasonal';
    return `
      <div class="count-card ${isSeasonal ? 'seasonal-card' : ''}">
        <div class="count-icon">${task.icon}</div>
        <div class="count-info">
          <div class="count-task-name">${task.name}</div>
          <div class="count-num">${cnt}</div>
          <div class="count-label">총 작업 횟수</div>
        </div>
      </div>`;
  }).join('');
}

// ───────────────────────────────────────────
// TOGGLE TASK
// ───────────────────────────────────────────
function toggleTask(card, e) {
  card.classList.toggle('checked');
  const circle = document.createElement('span');
  circle.classList.add('ripple');
  const rect = card.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  circle.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  card.appendChild(circle);
  setTimeout(() => circle.remove(), 600);
}

// ───────────────────────────────────────────
// SUBMIT
// ───────────────────────────────────────────
async function submitLog() {
  const checked = [...document.querySelectorAll('.task-card.checked')];
  if (!checked.length) { showToast('⚠️ 최소 하나 이상의 작업을 선택하세요','error'); return; }

  const btn = document.getElementById('submitBtn');
  const label = document.getElementById('submitLabel');
  btn.disabled = true; label.textContent = '전송 중...';

  const now = new Date();
  const ts = now.toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

  const regularTasks  = checked.filter(c => c.dataset.type === 'regular' ).map(c => c.dataset.task);
  const seasonalTasks = checked.filter(c => c.dataset.type === 'seasonal').map(c => c.dataset.task);
  const payload = {
    timestamp:      ts,
    location:       LOCATIONS[currentLoc].name,
    regularTasks:   regularTasks.join(', '),
    seasonalTasks:  seasonalTasks.join(', '),
    note:           document.getElementById('noteInput').value.trim(),
    submittedBy:    '',
  };

  // Increment counts via Sheets
  const taskIds = checked.map(c => ({ locIdx: currentLoc, taskId: c.dataset.id }));

  try {
    await fetch(SHEET_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    showToast('입력 완료!', 'success');
  } catch {
    showToast('전송 실패', 'error');
  }

  // Refresh shared counts
  await fetchCounts();

  // Reset
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('checked'));
  document.getElementById('noteInput').value = '';
  btn.disabled = false; label.textContent = '작업 완료 기록';
}

// ───────────────────────────────────────────
// TOAST
// ───────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
